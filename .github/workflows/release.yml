name: release

# ADR-0047 / W20-RELEASE: cross-platform distribution Phase 1 (unsigned/ad-hoc).
# Triggered by `v*` tags. Builds macOS (.app + .dmg) and Linux (tar.gz) artifacts
# via the `xtask` helper, generates SHA256SUMS, and uploads everything to a
# single DRAFT GitHub release for manual review before publishing.

on:
  push:
    tags:
      - "v*"
  # Allow a manual dry-run (builds artifacts, still uploads to a draft release).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    # Per-leg opt-in: the linux-arm64 leg sets continue-on-error so a missing
    # private-repo arm64 runner does not block the release (ADR-0047 追補).
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: macos-arm64
            kind: macos
            arch: arm64
          - os: ubuntu-latest
            target: linux-x86_64
            kind: linux
            arch: x86_64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            kind: linux
            arch: aarch64
          - os: windows-latest
            target: windows-x86_64
            kind: windows
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Verify runner architecture
        shell: bash
        run: |
          echo "uname -m: $(uname -m)"

      # ── Linux: gpui system build dependencies ─────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libx11-dev libxcb1-dev \
            libfontconfig-dev libfreetype-dev \
            libasound2-dev \
            libvulkan-dev \
            libzstd-dev

      # ── macOS: .app (ad-hoc signed) + .dmg ────────────────────────────────
      - name: Bundle macOS app + dmg
        if: matrix.kind == 'macos'
        run: |
          cargo run -p xtask -- bundle-macos
          cargo run -p xtask -- dmg-macos

      # ── Linux: release build + tar.gz ─────────────────────────────────────
      - name: Build Linux release binary
        if: matrix.kind == 'linux'
        run: cargo build --release -p kagi

      - name: Bundle Linux tar.gz
        if: matrix.kind == 'linux'
        run: cargo run -p xtask -- bundle-linux --bin target/release/kagi

      # ── Linux: AppImage zip (ADR-0047 追補, W21-APPIMAGE) ──────────────────
      # Fetch the matching appimagetool (FUSE-free via --appimage-extract-and-run,
      # which xtask passes through) and build Kagi-<arch>.AppImage + the zip.
      - name: Download appimagetool
        if: matrix.kind == 'linux'
        run: |
          url="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.arch }}.AppImage"
          curl -fsSL -o "${RUNNER_TEMP}/appimagetool" "$url"
          chmod +x "${RUNNER_TEMP}/appimagetool"
          echo "APPIMAGETOOL=${RUNNER_TEMP}/appimagetool" >> "$GITHUB_ENV"

      - name: Bundle AppImage zip
        if: matrix.kind == 'linux'
        run: cargo run -p xtask -- bundle-appimage --bin target/release/kagi --arch ${{ matrix.arch }}

      # ── Windows: release build + zip (assets are embedded in the .exe) ────
      - name: Build Windows release binary
        if: matrix.kind == 'windows'
        run: cargo build --release -p kagi

      - name: Bundle Windows zip
        if: matrix.kind == 'windows'
        run: cargo run -p xtask -- bundle-windows --bin target/release/kagi.exe

      # ── Checksums over this leg's artifacts ───────────────────────────────
      - name: Generate SHA256SUMS
        shell: bash
        working-directory: target/dist
        run: |
          shopt -s nullglob
          files=( *.dmg *.tar.gz *.zip )
          if [ ${#files[@]} -eq 0 ]; then
            echo "no artifacts produced" >&2
            exit 1
          fi
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${files[@]}" > "SHA256SUMS-${{ matrix.target }}.txt"
          else
            sha256sum "${files[@]}" > "SHA256SUMS-${{ matrix.target }}.txt"
          fi
          cat "SHA256SUMS-${{ matrix.target }}.txt"

      # Hand artifacts to the single release job (avoids concurrent
      # action-gh-release invocations racing and creating duplicate drafts).
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            target/dist/*.dmg
            target/dist/*.tar.gz
            target/dist/*.zip
            target/dist/SHA256SUMS-${{ matrix.target }}.txt
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: dist/*
